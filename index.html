<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>❄️ 雪雪心想事成</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --pink-50:  #fff5f7;
    --pink-100: #ffe8ec;
    --pink-200: #ffd4dc;
    --pink-300: #ffb8c6;
    --pink-400: #f89aaf;
    --pink-500: #f07a95;
    --pink-600: #e05d7c;
    --pink-700: #c94a68;
    --rose:      #d48a96;
    --text:      #5c3d4a;
    --text-light:#9b7b86;
    --white:     #fffafc;
    --glass:     rgba(255,255,255,0.22);
    --glass2:    rgba(255,255,255,0.45);
    --border:    rgba(255,220,230,0.5);
    --shadow:    0 4px 24px rgba(210,130,150,0.12);
    --shadow-lg: 0 12px 40px rgba(200,110,140,0.18);
  }

  body {
    width: 100vw; height: 100vh; height: 100dvh;
    overflow: hidden;
    font-family: 'PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;
    background: linear-gradient(170deg, #fff5f7 0%, #ffe8ee 20%, #ffd9e2 40%, #ffe4eb 60%, #fdd8e0 80%, #fff0f3 100%);
    background-size: 100% 100%;
    display: flex; justify-content: center; align-items: center;
    position: relative;
    -webkit-tap-highlight-color: transparent;
  }

  /* ─── 背景花瓣 ─── */
  .petal-container { position:fixed; inset:0; pointer-events:none; z-index:0; }
  .petal {
    position:absolute; font-size:18px; opacity:0;
    animation: petalFall linear infinite;
    filter: blur(0.5px);
  }
  @keyframes petalFall {
    0%   { opacity:0; transform: translate(0,0) rotate(0deg) scale(0.6); }
    5%   { opacity:0.7; }
    80%  { opacity:0.4; }
    100% { opacity:0; transform: translate(var(--dx), 105vh) rotate(var(--dr)) scale(1); }
  }

  /* ─── 背景柔光 ─── */
  .bg-glow {
    position:fixed; border-radius:50%; filter:blur(120px); pointer-events:none; z-index:0;
    opacity:0.35;
  }
  .bg-glow.g1 { width:400px; height:400px; background:#ffcdd6; top:-80px; left:-60px; }
  .bg-glow.g2 { width:350px; height:350px; background:#fbc0cb; bottom:-60px; right:-80px; animation: glowPulse 8s ease-in-out infinite; }
  .bg-glow.g3 { width:250px; height:250px; background:#ffdee5; top:40%; left:50%; translate:-50% -50%; animation: glowPulse 6s ease-in-out infinite reverse; }
  @keyframes glowPulse {
    0%,100% { transform:scale(1); opacity:0.3; }
    50%     { transform:scale(1.2); opacity:0.45; }
  }

  /* ─── 主卡片 ─── */
  .main-container { position:relative; z-index:1; width:480px; max-width:94vw; }
  .card {
    background: var(--glass);
    backdrop-filter: blur(28px) saturate(130%);
    -webkit-backdrop-filter: blur(28px) saturate(130%);
    border: 1px solid var(--border);
    border-radius: 32px;
    padding: 40px 32px 32px;
    box-shadow: var(--shadow), 0 0 60px rgba(250,180,200,0.08) inset;
    text-align: center;
    position: relative;
  }
  .card::before {
    content:''; position:absolute; top:0; left:50%; translate:-50% 0;
    width:100px; height:2px; border-radius:2px;
    background: linear-gradient(90deg, transparent, var(--rose), transparent);
  }

  .title-icon { font-size:42px; line-height:1; margin-bottom:6px; animation: floatIcon 2.5s ease-in-out infinite; }
  @keyframes floatIcon {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-5px); }
  }
  .title {
    font-size:28px; font-weight:700;
    background: linear-gradient(135deg, #e05d7c, #d48a96, #e05d7c);
    background-size:200% auto; -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    animation: shimmer 3s linear infinite; letter-spacing:5px;
  }
  @keyframes shimmer { to { background-position:200% center; } }
  .subtitle { font-size:13px; color: var(--text-light); margin-top:2px; letter-spacing:3px; font-weight:300; }

  /* ─── 输入区 ─── */
  .input-group { display:flex; gap:10px; margin:26px 0 18px; }
  .wish-input {
    flex:1; padding:13px 18px; border:1.5px solid rgba(220,170,185,0.35);
    border-radius:18px; background:rgba(255,255,255,0.5);
    font-size:14px; color:var(--text); outline:none; transition:all .35s;
    font-family:inherit; letter-spacing:1px;
  }
  .wish-input::placeholder { color:#c8a8b4; }
  .wish-input:focus { border-color:var(--pink-500); box-shadow:0 0 0 4px rgba(240,122,149,0.08); background:rgba(255,255,255,0.75); }
  .btn-submit {
    padding:13px 22px; border:none; border-radius:18px;
    background: linear-gradient(135deg, #f07a95, #e05d7c);
    color:#fff; font-size:14px; font-weight:600; cursor:pointer;
    letter-spacing:2px; transition:all .35s;
    box-shadow:0 4px 18px rgba(224,93,124,0.3); white-space:nowrap; font-family:inherit;
  }
  .btn-submit:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(224,93,124,0.4); }
  .btn-submit:active { transform:scale(0.96); }

  .preset-label { font-size:11px; color:var(--text-light); letter-spacing:2px; margin-bottom:10px; }
  .preset-tags { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }
  .preset-tag {
    padding:7px 16px; border-radius:20px; border:1px solid rgba(220,160,175,0.35);
    background:rgba(255,255,255,0.4); font-size:12px; color:#9b7483;
    cursor:pointer; transition:all .3s; letter-spacing:1px; font-family:inherit;
  }
  .preset-tag:hover { background:rgba(240,122,149,0.12); border-color:#f07a95; color:#e05d7c; transform:translateY(-1px); }

  .wish-count { font-size:12px; color:var(--text-light); margin-top:8px; letter-spacing:1px; }
  .wish-count span { color:#e05d7c; font-weight:600; }

  /* ─── 雪花画布 ─── */
  #snowCanvas { position:fixed; inset:0; pointer-events:none; z-index:10; }

  /* ─── 左下角：愿望记录 ─── */
  .float-btn-left {
    position:fixed; bottom:28px; left:28px; z-index:20;
    width:52px; height:52px; border-radius:50%;
    background:var(--glass2); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    border:1px solid var(--border); box-shadow:var(--shadow);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    font-size:22px; transition:all .35s; color:#e05d7c;
  }
  .float-btn-left:hover { transform:scale(1.08); box-shadow:var(--shadow-lg); }
  .float-btn-left .badge {
    position:absolute; top:-4px; right:-4px; min-width:18px; height:18px;
    border-radius:9px; background:#e05d7c; color:#fff; font-size:10px;
    display:flex; align-items:center; justify-content:center; padding:0 5px;
    font-weight:600; line-height:1;
  }

  /* ─── 右下角：漂流瓶 ─── */
  .float-btn-right {
    position:fixed; bottom:28px; right:28px; z-index:20;
    width:52px; height:52px; border-radius:50%;
    background:var(--glass2); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    border:1px solid var(--border); box-shadow:var(--shadow);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    font-size:22px; transition:all .35s; color:#e05d7c;
  }
  .float-btn-right:hover { transform:scale(1.08); box-shadow:var(--shadow-lg); }
  .float-btn-right .badge {
    position:absolute; top:-4px; right:-4px; min-width:18px; height:18px;
    border-radius:9px; background:#e05d7c; color:#fff; font-size:10px;
    display:flex; align-items:center; justify-content:center; padding:0 5px;
    font-weight:600; line-height:1;
  }

  /* ─── 面板通用 ─── */
  .panel-overlay {
    position:fixed; inset:0; z-index:100; background:rgba(60,20,30,0.15);
    backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
    display:flex; align-items:flex-end; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity .35s;
  }
  .panel-overlay.open { opacity:1; pointer-events:auto; }

  .panel {
    background:rgba(255,248,250,0.92); backdrop-filter:blur(30px); -webkit-backdrop-filter:blur(30px);
    border-radius:28px 28px 0 0; width:100%; max-width:480px; max-height:70vh;
    display:flex; flex-direction:column; overflow:hidden;
    transform:translateY(100%); transition:transform .4s cubic-bezier(.23,1,.32,1);
    box-shadow:0 -8px 40px rgba(200,120,140,0.15);
  }
  .panel-overlay.open .panel { transform:translateY(0); }

  .panel-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:20px 24px 12px; border-bottom:1px solid rgba(220,180,190,0.25);
    flex-shrink:0;
  }
  .panel-header h3 { font-size:17px; color:var(--text); letter-spacing:2px; font-weight:600; }
  .panel-close {
    width:32px; height:32px; border-radius:50%; border:none;
    background:rgba(220,180,190,0.2); font-size:16px; cursor:pointer;
    color:var(--text-light); transition:all .3s; display:flex; align-items:center; justify-content:center;
  }
  .panel-close:hover { background:rgba(220,150,165,0.35); color:var(--text); }
  .panel-body { flex:1; overflow-y:auto; padding:16px 24px 24px; }

  /* ─── 愿望记录列表 ─── */
  .history-empty { text-align:center; padding:40px 20px; color:var(--text-light); font-size:14px; letter-spacing:1px; }
  .history-empty .icon { font-size:48px; display:block; margin-bottom:12px; }
  .history-item {
    display:flex; align-items:center; gap:12px; padding:13px 16px;
    border-radius:16px; background:rgba(255,255,255,0.5);
    margin-bottom:8px; transition:all .3s;
    border:1px solid rgba(220,180,190,0.2);
  }
  .history-item:hover { background:rgba(255,255,255,0.7); }
  .history-num { width:28px; height:28px; border-radius:50%; background:linear-gradient(135deg,#f7a0b5,#e05d7c); color:#fff; font-size:12px; font-weight:600; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .history-text { flex:1; font-size:14px; color:var(--text); letter-spacing:1px; }
  .history-time { font-size:11px; color:var(--text-light); flex-shrink:0; }
  .clear-history {
    display:block; margin:16px auto 0; padding:8px 24px; border-radius:20px;
    border:1px solid rgba(220,160,175,0.4); background:transparent;
    color:var(--text-light); font-size:12px; cursor:pointer; letter-spacing:1px;
    transition:all .3s; font-family:inherit;
  }
  .clear-history:hover { background:rgba(240,122,149,0.1); border-color:#f07a95; color:#e05d7c; }

  /* ─── 漂流瓶 ─── */
  .bottle-modes { display:flex; gap:12px; margin-bottom:20px; }
  .bottle-mode-btn {
    flex:1; padding:14px; border-radius:18px; border:1.5px solid rgba(220,160,175,0.3);
    background:rgba(255,255,255,0.45); cursor:pointer; text-align:center;
    transition:all .3s; font-family:inherit; letter-spacing:1px;
  }
  .bottle-mode-btn .icon { font-size:28px; display:block; margin-bottom:6px; }
  .bottle-mode-btn .label { font-size:13px; color:var(--text); font-weight:500; }
  .bottle-mode-btn .hint { font-size:11px; color:var(--text-light); margin-top:2px; }
  .bottle-mode-btn:hover { border-color:var(--pink-400); background:rgba(255,255,255,0.65); }
  .bottle-mode-btn.active { border-color:var(--pink-500); background:rgba(240,122,149,0.08); }

  .bottle-section { display:none; }
  .bottle-section.active { display:block; }

  .bottle-textarea {
    width:100%; height:100px; padding:14px 16px; border-radius:16px;
    border:1.5px solid rgba(220,170,185,0.35); background:rgba(255,255,255,0.5);
    font-size:14px; color:var(--text); resize:none; outline:none;
    font-family:inherit; letter-spacing:1px; transition:all .35s;
  }
  .bottle-textarea:focus { border-color:var(--pink-500); box-shadow:0 0 0 4px rgba(240,122,149,0.06); }
  .bottle-textarea::placeholder { color:#c8a8b4; }

  .bottle-throw-btn {
    display:block; margin:14px auto 0; padding:12px 32px; border-radius:22px;
    border:none; background:linear-gradient(135deg,#f07a95,#e05d7c);
    color:#fff; font-size:14px; font-weight:600; cursor:pointer;
    letter-spacing:2px; transition:all .35s; font-family:inherit;
    box-shadow:0 4px 16px rgba(224,93,124,0.25);
  }
  .bottle-throw-btn:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(224,93,124,0.35); }

  .bottle-catch-area { text-align:center; }
  .bottle-visual {
    font-size:80px; display:block; margin:10px 0; cursor:pointer;
    animation: bottleFloat 3s ease-in-out infinite; transition:transform .3s;
  }
  .bottle-visual:hover { transform:scale(1.1); }
  @keyframes bottleFloat {
    0%,100% { transform:translateY(0) rotate(-2deg); }
    50%     { transform:translateY(-8px) rotate(2deg); }
  }
  .bottle-visual.shaking { animation: bottleShake .5s ease-in-out; }
  @keyframes bottleShake {
    0%,100% { transform:translateX(0) rotate(0); }
    25%     { transform:translateX(-8px) rotate(-5deg); }
    50%     { transform:translateX(8px) rotate(5deg); }
    75%     { transform:translateX(-4px) rotate(-3deg); }
  }
  .bottle-catch-hint { font-size:13px; color:var(--text-light); letter-spacing:1px; }

  /* ─── 漂流瓶揭示弹窗 ─── */
  .reveal-overlay {
    position:fixed; inset:0; z-index:200; background:rgba(60,20,30,0.25);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity .4s;
  }
  .reveal-overlay.open { opacity:1; pointer-events:auto; }

  .reveal-card {
    background:rgba(255,248,250,0.95); backdrop-filter:blur(30px); -webkit-backdrop-filter:blur(30px);
    border-radius:24px; padding:36px 28px; width:340px; max-width:90vw;
    text-align:center; box-shadow:0 20px 60px rgba(180,100,120,0.25);
    border:1px solid rgba(255,220,230,0.5);
    animation: revealPop .45s cubic-bezier(.23,1,.32,1);
  }
  @keyframes revealPop {
    0% { transform:scale(0.8) translateY(20px); opacity:0; }
    100% { transform:scale(1) translateY(0); opacity:1; }
  }
  .reveal-card.burning {
    animation: burnAway .8s ease-in forwards;
  }
  @keyframes burnAway {
    0% { transform:scale(1); opacity:1; filter:blur(0); }
    30% { transform:scale(1.05); opacity:0.9; filter:blur(1px); }
    100% { transform:scale(0.7); opacity:0; filter:blur(8px); }
  }
  .reveal-icon { font-size:56px; display:block; margin-bottom:12px; }
  .reveal-msg { font-size:16px; color:var(--text); letter-spacing:2px; line-height:1.6; margin-bottom:6px; }
  .reveal-time { font-size:11px; color:var(--text-light); margin-bottom:18px; }
  .reveal-burn-hint { font-size:12px; color:#e05d7c; letter-spacing:1px; animation: blinkHint 1.5s ease-in-out infinite; }
  @keyframes blinkHint {
    0%,100% { opacity:1; }
    50%     { opacity:0.4; }
  }

  .bottle-empty { text-align:center; padding:20px; color:var(--text-light); font-size:13px; letter-spacing:1px; }

  /* ─── Toast ─── */
  .toast {
    position:fixed; top:30px; left:50%; translate:-50% 0; z-index:300;
    padding:10px 24px; border-radius:22px; background:rgba(255,248,250,0.9);
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    border:1px solid rgba(255,200,215,0.5); color:var(--text);
    font-size:13px; letter-spacing:1px; box-shadow:0 4px 20px rgba(200,120,150,0.2);
    pointer-events:none; opacity:0; transform:translateY(-10px);
    transition:all .4s cubic-bezier(.23,1,.32,1);
  }
  .toast.show { opacity:1; transform:translateY(0); }
</style>
</head>
<body>

<!-- 背景柔光 -->
<div class="bg-glow g1"></div>
<div class="bg-glow g2"></div>
<div class="bg-glow g3"></div>

<!-- 背景花瓣 -->
<div class="petal-container" id="petalContainer"></div>

<!-- 雪花画布 -->
<canvas id="snowCanvas"></canvas>

<!-- 主卡片 -->
<div class="main-container">
  <div class="card">
    <div class="title-icon">❄️</div>
    <div class="title">雪雪心想事成</div>
    <div class="subtitle">许下心愿 · 如雪花般飘落</div>
    <div class="input-group">
      <input class="wish-input" id="wishInput" type="text" placeholder="写下你的愿望…" maxlength="30" autocomplete="off" />
      <button class="btn-submit" id="btnSubmit">✨ 许愿</button>
    </div>
    <div class="preset-label">— 点击快速许愿 —</div>
    <div class="preset-tags" id="presetTags">
      <span class="preset-tag" data-wish="天天开心">天天开心</span>
      <span class="preset-tag" data-wish="万事如意">万事如意</span>
      <span class="preset-tag" data-wish="暴富暴美">暴富暴美</span>
      <span class="preset-tag" data-wish="身体健康">身体健康</span>
      <span class="preset-tag" data-wish="好运连连">好运连连</span>
      <span class="preset-tag" data-wish="梦想成真">梦想成真</span>
    </div>
    <div class="wish-count">已许下 <span id="wishCounter">0</span> 个心愿</div>
  </div>
</div>

<!-- 左下角：愿望记录 -->
<button class="float-btn-left" id="btnHistory" title="愿望记录">
  💝<span class="badge" id="historyBadge" style="display:none">0</span>
</button>

<!-- 右下角：漂流瓶 -->
<button class="float-btn-right" id="btnBottle" title="阅后即焚漂流瓶">
  🍾<span class="badge" id="bottleBadge" style="display:none">0</span>
</button>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- 愿望记录面板 -->
<div class="panel-overlay" id="historyOverlay">
  <div class="panel">
    <div class="panel-header">
      <h3>💝 愿望记录</h3>
      <button class="panel-close" id="btnHistoryClose">✕</button>
    </div>
    <div class="panel-body" id="historyBody">
      <div class="history-empty"><span class="icon">💫</span>还没有许下愿望呢～</div>
    </div>
  </div>
</div>

<!-- 漂流瓶面板 -->
<div class="panel-overlay" id="bottleOverlay">
  <div class="panel">
    <div class="panel-header">
      <h3>🍾 阅后即焚漂流瓶</h3>
      <button class="panel-close" id="btnBottleClose">✕</button>
    </div>
    <div class="panel-body">
      <div class="bottle-modes">
        <button class="bottle-mode-btn active" data-mode="throw">
          <span class="icon">📝</span><span class="label">扔瓶子</span><span class="hint">写下心事投进大海</span>
        </button>
        <button class="bottle-mode-btn" data-mode="catch">
          <span class="icon">🎣</span><span class="label">捡瓶子</span><span class="hint">随机捞取一个漂流瓶</span>
        </button>
      </div>
      <!-- 扔瓶子 -->
      <div class="bottle-section active" id="sectionThrow">
        <textarea class="bottle-textarea" id="bottleMsg" placeholder="写下你想说的话…（最多100字）" maxlength="100"></textarea>
        <button class="bottle-throw-btn" id="btnThrow">🌊 投入大海</button>
      </div>
      <!-- 捡瓶子 -->
      <div class="bottle-section" id="sectionCatch">
        <div class="bottle-catch-area">
          <span class="bottle-visual" id="bottleVisual">🍾</span>
          <p class="bottle-catch-hint">👆 点击瓶子捞取</p>
          <p class="bottle-empty" id="bottleEmpty" style="display:none">🌊 海面上还没有漂流瓶…<br>先去扔几个吧！</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 漂流瓶揭示弹窗 -->
<div class="reveal-overlay" id="revealOverlay">
  <div class="reveal-card" id="revealCard">
    <span class="reveal-icon">📜</span>
    <p class="reveal-msg" id="revealMsg"></p>
    <p class="reveal-time" id="revealTime"></p>
    <p class="reveal-burn-hint">🔥 此消息阅后即焚</p>
  </div>
</div>

<script>
(function(){
  // ═══════════════════════════════════════
  //  云端数据同步（jsonblob.com · 跨设备互通）
  // ═══════════════════════════════════════
  const BLOB_ID  = '019ef7a5-08b9-7b71-8859-1d54dbd438e2';
  const BLOB_URL = `https://jsonblob.com/api/jsonBlob/${BLOB_ID}`;

  let cloudBottles = [];
  let cloudWishes = [];
  let syncing = false;

  // 从云端加载数据
  async function loadFromCloud() {
    try {
      const res = await fetch(BLOB_URL + '?t=' + Date.now(), { cache: 'no-store' });
      if (!res.ok) throw new Error('fetch failed');
      const data = await res.json();
      cloudBottles = data.bottles || [];
      cloudWishes = data.wishes || [];
      localStorage.setItem('xuexue_wishes', JSON.stringify(cloudWishes));
      localStorage.setItem('xuexue_bottles', JSON.stringify(cloudBottles));
      return true;
    } catch(e) {
      cloudWishes = JSON.parse(localStorage.getItem('xuexue_wishes') || '[]');
      cloudBottles = JSON.parse(localStorage.getItem('xuexue_bottles') || '[]');
      return false;
    }
  }

  // 保存到云端
  async function saveToCloud() {
    if (syncing) return;
    syncing = true;
    try {
      const content = JSON.stringify({ bottles: cloudBottles, wishes: cloudWishes });
      const res = await fetch(BLOB_URL, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: content
      });
      if (res.ok) {
        localStorage.setItem('xuexue_wishes', JSON.stringify(cloudWishes));
        localStorage.setItem('xuexue_bottles', JSON.stringify(cloudBottles));
      }
    } catch(e) { /* 静默失败，下次重试 */ }
    syncing = false;
  }

  // ═══════════════════════════════════════
  //  雪花愿望系统
  // ═══════════════════════════════════════
  const input    = document.getElementById('wishInput');
  const btn      = document.getElementById('btnSubmit');
  const counter  = document.getElementById('wishCounter');
  const canvas   = document.getElementById('snowCanvas');
  const ctx      = canvas.getContext('2d');

  let snowflakes = [];
  let wishCount  = 0;

  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize); resize();

  const pinkColors = ['#f07a95','#e05d7c','#f48fb1','#f89aaf','#d48a96','#f8bbd0','#ffb8c6','#e891a0','#f0c0d0','#e8a0b4'];

  class Snowflake {
    constructor(text, x, y) {
      this.text = text;
      this.x = x ?? Math.random() * canvas.width;
      this.y = y ?? -60 - Math.random() * 200;
      this.size = 12 + Math.random() * 6;
      this.speedY = 0.6 + Math.random() * 1.4;
      this.speedX = (Math.random() - 0.5) * 0.8;
      this.wobbleAmp = 0.3 + Math.random() * 0.7;
      this.wobbleSpeed = 0.01 + Math.random() * 0.03;
      this.wobbleOffset = Math.random() * Math.PI * 2;
      this.rotation = (Math.random() - 0.5) * 0.5;
      this.rotationSpeed = (Math.random() - 0.5) * 0.02;
      this.opacity = 0.7 + Math.random() * 0.3;
      this.scale = 0.8 + Math.random() * 0.4;
      this.frame = 0;
      this.alive = true;
      this.color = pinkColors[Math.floor(Math.random() * pinkColors.length)];
    }
    update() {
      this.frame++;
      this.y += this.speedY;
      this.x += this.speedX + Math.sin(this.frame * this.wobbleSpeed + this.wobbleOffset) * this.wobbleAmp;
      this.rotation += this.rotationSpeed;
      if (this.y > canvas.height + 80) this.alive = false;
      if (this.x < -80) this.x = canvas.width + 40;
      if (this.x > canvas.width + 80) this.x = -40;
    }
    draw(ctx) {
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rotation);
      ctx.scale(this.scale, this.scale);
      ctx.globalAlpha = this.opacity;
      ctx.font = `${this.size * 2.2}px "PingFang SC","Microsoft YaHei",sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.fillText('❄', 0, 0);
      ctx.font = `600 ${this.size}px "PingFang SC","Microsoft YaHei",sans-serif`;
      ctx.shadowColor = this.color; ctx.shadowBlur = 8;
      ctx.fillStyle = this.color;
      ctx.fillText(this.text, 0, -this.size * 0.3);
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.fillText(this.text, 0, -this.size * 0.3);
      ctx.restore();
    }
  }

  function addWish(text) {
    const count = 3 + Math.floor(Math.random() * 4);
    for (let i = 0; i < count; i++) {
      snowflakes.push(new Snowflake(text, Math.random() * canvas.width, -60 - Math.random() * 300));
    }
    wishCount++;
    counter.textContent = wishCount;
    // 保存到云端
    const record = { text, time: new Date().toLocaleString('zh-CN') };
    cloudWishes.unshift(record);
    if (cloudWishes.length > 50) cloudWishes = cloudWishes.slice(0, 50);
    saveToCloud();
    updateHistoryBadge();
  }

  function submitWish() {
    const text = input.value.trim();
    if (!text) return;
    if (text.length > 30) { shakeEl(input); return; }
    addWish(text);
    input.value = ''; input.focus();
  }

  function shakeEl(el) {
    el.style.animation = 'none'; el.offsetHeight;
    el.style.animation = 'shake .4s ease';
    setTimeout(() => el.style.animation = '', 400);
  }

  btn.addEventListener('click', submitWish);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') submitWish(); });
  document.getElementById('presetTags').addEventListener('click', e => {
    const tag = e.target.closest('.preset-tag');
    if (!tag) return;
    addWish(tag.dataset.wish);
  });

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    snowflakes = snowflakes.filter(s => { s.update(); s.draw(ctx); return s.alive; });
    requestAnimationFrame(animate);
  }
  animate();

  const shakeStyle = document.createElement('style');
  shakeStyle.textContent = '@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}';
  document.head.appendChild(shakeStyle);

  // ═══════════════════════════════════════
  //  背景花瓣
  // ═══════════════════════════════════════
  const petalContainer = document.getElementById('petalContainer');
  const petalEmojis = ['🌸','💮','🌷','🩷','✿','❀','🌺'];
  function createPetal() {
    const p = document.createElement('span');
    p.className = 'petal';
    p.textContent = petalEmojis[Math.floor(Math.random() * petalEmojis.length)];
    p.style.left = Math.random() * 100 + '%';
    p.style.top = -(20 + Math.random() * 60) + 'px';
    p.style.setProperty('--dx', (Math.random() - 0.5) * 200 + 'px');
    p.style.setProperty('--dr', (Math.random() - 0.5) * 720 + 'deg');
    p.style.fontSize = (14 + Math.random() * 18) + 'px';
    p.style.animationDuration = (10 + Math.random() * 18) + 's';
    p.style.animationDelay = Math.random() * 5 + 's';
    petalContainer.appendChild(p);
    setTimeout(() => p.remove(), 25000);
  }
  for (let i = 0; i < 14; i++) createPetal();
  setInterval(createPetal, 3000);

  // ═══════════════════════════════════════
  //  Toast
  // ═══════════════════════════════════════
  const toast = document.getElementById('toast');
  let toastTimer;
  function showToast(msg) {
    toast.textContent = msg; toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
  }

  // ═══════════════════════════════════════
  //  愿望记录面板
  // ═══════════════════════════════════════
  const historyOverlay = document.getElementById('historyOverlay');
  const historyBody    = document.getElementById('historyBody');
  const historyBadge   = document.getElementById('historyBadge');

  function updateHistoryBadge() {
    const len = cloudWishes.length;
    if (len > 0) { historyBadge.style.display = 'flex'; historyBadge.textContent = len > 99 ? '99+' : len; }
    else { historyBadge.style.display = 'none'; }
  }
  function renderHistory() {
    if (cloudWishes.length === 0) {
      historyBody.innerHTML = '<div class="history-empty"><span class="icon">💫</span>还没有许下愿望呢～</div>';
      return;
    }
    historyBody.innerHTML = cloudWishes.map((w, i) => `
      <div class="history-item">
        <span class="history-num">${i + 1}</span>
        <span class="history-text">${escapeHtml(w.text)}</span>
        <span class="history-time">${w.time}</span>
      </div>
    `).join('') + `
      <button class="clear-history" id="btnClearHistory">🗑 清空记录</button>
    `;
    document.getElementById('btnClearHistory').addEventListener('click', () => {
      cloudWishes = [];
      saveToCloud();
      renderHistory();
      updateHistoryBadge();
      showToast('记录已清空 ✨');
    });
  }
  function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  document.getElementById('btnHistory').addEventListener('click', () => {
    renderHistory();
    historyOverlay.classList.add('open');
  });
  document.getElementById('btnHistoryClose').addEventListener('click', () => {
    historyOverlay.classList.remove('open');
  });
  historyOverlay.addEventListener('click', e => {
    if (e.target === historyOverlay) historyOverlay.classList.remove('open');
  });

  // ═══════════════════════════════════════
  //  漂流瓶系统（阅后即焚 · 云端同步）
  // ═══════════════════════════════════════
  const bottleOverlay  = document.getElementById('bottleOverlay');
  const bottleBadge    = document.getElementById('bottleBadge');
  const revealOverlay  = document.getElementById('revealOverlay');
  const revealCard     = document.getElementById('revealCard');
  const revealMsg      = document.getElementById('revealMsg');
  const revealTime     = document.getElementById('revealTime');
  const bottleVisual   = document.getElementById('bottleVisual');
  const bottleEmpty    = document.getElementById('bottleEmpty');
  const sectionThrow   = document.getElementById('sectionThrow');
  const sectionCatch   = document.getElementById('sectionCatch');
  const bottleMsg      = document.getElementById('bottleMsg');

  let currentBottle = null;

  function updateBottleBadge() {
    const len = cloudBottles.length;
    if (len > 0) { bottleBadge.style.display = 'flex'; bottleBadge.textContent = len > 99 ? '99+' : len; }
    else { bottleBadge.style.display = 'none'; }
    if (len === 0) { bottleEmpty.style.display = 'block'; bottleVisual.style.display = 'none'; }
    else { bottleEmpty.style.display = 'none'; bottleVisual.style.display = 'block'; }
  }

  // 模式切换
  document.querySelectorAll('.bottle-mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.bottle-mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const mode = btn.dataset.mode;
      if (mode === 'throw') { sectionThrow.classList.add('active'); sectionCatch.classList.remove('active'); }
      else { sectionCatch.classList.add('active'); sectionThrow.classList.remove('active'); updateBottleBadge(); }
    });
  });

  // 扔瓶子
  document.getElementById('btnThrow').addEventListener('click', () => {
    const msg = bottleMsg.value.trim();
    if (!msg) { showToast('💬 写点什么再扔吧～'); return; }
    cloudBottles.push({ text: msg, time: new Date().toLocaleString('zh-CN') });
    if (cloudBottles.length > 100) cloudBottles = cloudBottles.slice(-100);
    saveToCloud();
    bottleMsg.value = '';
    updateBottleBadge();
    showToast('🌊 瓶子已投入大海！');
  });

  // 捡瓶子 - 点击瓶子
  bottleVisual.addEventListener('click', () => {
    if (cloudBottles.length === 0) { showToast('🌊 还没有漂流瓶哦～'); return; }
    bottleVisual.classList.add('shaking');
    setTimeout(() => bottleVisual.classList.remove('shaking'), 500);
    const idx = Math.floor(Math.random() * cloudBottles.length);
    currentBottle = cloudBottles[idx];
    revealMsg.textContent = currentBottle.text;
    revealTime.textContent = '🕐 ' + currentBottle.time;
    revealCard.classList.remove('burning');
    revealOverlay.classList.add('open');
    // 阅后即焚：从数组中删除并同步云端
    cloudBottles.splice(idx, 1);
    saveToCloud();
    updateBottleBadge();
  });

  // 点击揭示弹窗 → 阅后即焚
  revealOverlay.addEventListener('click', () => {
    if (!currentBottle) return;
    revealCard.classList.add('burning');
    setTimeout(() => {
      revealOverlay.classList.remove('open');
      currentBottle = null;
    }, 800);
  });

  // 漂流瓶面板开关
  document.getElementById('btnBottle').addEventListener('click', () => {
    updateBottleBadge();
    bottleOverlay.classList.add('open');
  });
  document.getElementById('btnBottleClose').addEventListener('click', () => {
    bottleOverlay.classList.remove('open');
  });
  bottleOverlay.addEventListener('click', e => {
    if (e.target === bottleOverlay) bottleOverlay.classList.remove('open');
  });

  // ═══════════════════════════════════════
  //  初始化：从云端加载数据
  // ═══════════════════════════════════════
  async function init() {
    await loadFromCloud();
    wishCount = cloudWishes.length;
    counter.textContent = wishCount;
    updateHistoryBadge();
    updateBottleBadge();
    // 初始欢迎雪花
    setTimeout(() => { addWish('心想事成'); addWish('天天开心'); }, 600);
    setTimeout(() => addWish('万事如意'), 1200);
    // 定时从云端刷新（同步其他设备的变更）
    setInterval(async () => {
      await loadFromCloud();
      wishCount = cloudWishes.length;
      counter.textContent = wishCount;
      updateHistoryBadge();
      updateBottleBadge();
    }, 8000);
  }

  init();
})();
</script>
</body>
</html>
