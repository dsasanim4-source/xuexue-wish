<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>❄️ 雪雪心想事成</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --pink-50:  #fff5f7;
    --pink-100: #ffe8ec;
    --pink-200: #ffd4dc;
    --pink-300: #ffb8c6;
    --pink-400: #f89aaf;
    --pink-500: #f07a95;
    --pink-600: #e05d7c;
    --pink-700: #c94a68;
    --rose:      #d48a96;
    --text:      #5c3d4a;
    --text-light:#9b7b86;
    --white:     #fffafc;
    --glass:     rgba(255,255,255,0.22);
    --glass2:    rgba(255,255,255,0.45);
    --border:    rgba(255,220,230,0.5);
    --shadow:    0 4px 24px rgba(210,130,150,0.12);
    --shadow-lg: 0 12px 40px rgba(200,110,140,0.18);
  }

  body {
    width: 100vw; height: 100vh; height: 100dvh;
    overflow: hidden;
    font-family: 'PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;
    background: linear-gradient(170deg, #fff5f7 0%, #ffe8ee 20%, #ffd9e2 40%, #ffe4eb 60%, #fdd8e0 80%, #fff0f3 100%);
    display: flex; justify-content: center; align-items: center;
    position: relative;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none; user-select: none;
  }

  /* ─── 背景柔光 ─── */
  .bg-glow {
    position:fixed; border-radius:50%; filter:blur(120px); pointer-events:none; z-index:0; opacity:0.35;
  }
  .bg-glow.g1 { width:400px; height:400px; background:#ffcdd6; top:-80px; left:-60px; }
  .bg-glow.g2 { width:350px; height:350px; background:#fbc0cb; bottom:-60px; right:-80px; animation: glowPulse 8s ease-in-out infinite; }
  .bg-glow.g3 { width:250px; height:250px; background:#ffdee5; top:40%; left:50%; translate:-50% -50%; animation: glowPulse 6s ease-in-out infinite reverse; }
  @keyframes glowPulse { 0%,100% { transform:scale(1); opacity:0.3; } 50% { transform:scale(1.2); opacity:0.45; } }

  /* ─── 背景花瓣 ─── */
  .petal-container { position:fixed; inset:0; pointer-events:none; z-index:0; }
  .petal {
    position:absolute; font-size:18px; opacity:0;
    animation: petalFall linear infinite; filter: blur(0.5px);
  }
  @keyframes petalFall {
    0%   { opacity:0; transform: translate(0,0) rotate(0deg) scale(0.6); }
    5%   { opacity:0.7; }
    80%  { opacity:0.4; }
    100% { opacity:0; transform: translate(var(--dx), 105vh) rotate(var(--dr)) scale(1); }
  }

  /* ─── 主卡片 ─── */
  .main-container { position:relative; z-index:1; width:480px; max-width:94vw; }
  .card {
    background: var(--glass);
    backdrop-filter: blur(28px) saturate(130%);
    -webkit-backdrop-filter: blur(28px) saturate(130%);
    border: 1px solid var(--border);
    border-radius: 32px;
    padding: 40px 32px 32px;
    box-shadow: var(--shadow), 0 0 60px rgba(250,180,200,0.08) inset;
    text-align: center; position: relative;
  }
  .card::before {
    content:''; position:absolute; top:0; left:50%; translate:-50% 0;
    width:100px; height:2px; border-radius:2px;
    background: linear-gradient(90deg, transparent, var(--rose), transparent);
  }

  .title-icon { font-size:42px; line-height:1; margin-bottom:6px; animation: floatIcon 2.5s ease-in-out infinite; }
  @keyframes floatIcon { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
  .title {
    font-size:28px; font-weight:700;
    background: linear-gradient(135deg, #e05d7c, #d48a96, #e05d7c);
    background-size:200% auto; -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    animation: shimmer 3s linear infinite; letter-spacing:5px;
  }
  @keyframes shimmer { to { background-position:200% center; } }
  .subtitle { font-size:13px; color: var(--text-light); margin-top:2px; letter-spacing:3px; font-weight:300; }

  /* ─── 输入区 ─── */
  .input-group { display:flex; gap:10px; margin:26px 0 18px; }
  .wish-input {
    flex:1; padding:13px 18px; border:1.5px solid rgba(220,170,185,0.35);
    border-radius:18px; background:rgba(255,255,255,0.5);
    font-size:14px; color:var(--text); outline:none; transition:all .35s;
    font-family:inherit; letter-spacing:1px;
  }
  .wish-input::placeholder { color:#c8a8b4; }
  .wish-input:focus { border-color:var(--pink-500); box-shadow:0 0 0 4px rgba(240,122,149,0.08); background:rgba(255,255,255,0.75); }
  .btn-submit {
    padding:13px 22px; border:none; border-radius:18px;
    background: linear-gradient(135deg, #f07a95, #e05d7c);
    color:#fff; font-size:14px; font-weight:600; cursor:pointer;
    letter-spacing:2px; transition:all .35s;
    box-shadow:0 4px 18px rgba(224,93,124,0.3); white-space:nowrap; font-family:inherit;
  }
  .btn-submit:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(224,93,124,0.4); }
  .btn-submit:active { transform:scale(0.96); }

  .preset-label { font-size:11px; color:var(--text-light); letter-spacing:2px; margin-bottom:10px; }
  .preset-tags { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }
  .preset-tag {
    padding:7px 16px; border-radius:20px; border:1px solid rgba(220,160,175,0.35);
    background:rgba(255,255,255,0.4); font-size:12px; color:#9b7483;
    cursor:pointer; transition:all .3s; letter-spacing:1px; font-family:inherit;
  }
  .preset-tag:hover { background:rgba(240,122,149,0.12); border-color:#f07a95; color:#e05d7c; transform:translateY(-1px); }

  .wish-count { font-size:12px; color:var(--text-light); margin-top:8px; letter-spacing:1px; }
  .wish-count span { color:#e05d7c; font-weight:600; }

  /* ─── 浮动愿望（上升） ─── */
  .floating-wishes { position:fixed; inset:0; pointer-events:none; z-index:10; }
  .floating-wish {
    position:absolute; font-size:15px; font-weight:600; letter-spacing:2px;
    white-space:nowrap; opacity:0;
    animation: wishRise 8s ease-out forwards;
    text-shadow: 0 0 12px rgba(240,122,149,0.5);
  }
  @keyframes wishRise {
    0%   { opacity:0; transform: translateY(0) scale(0.5); }
    10%  { opacity:1; }
    70%  { opacity:0.8; }
    100% { opacity:0; transform: translateY(-380px) scale(1.1); }
  }

  /* ─── 左下角：愿望墙 ─── */
  .float-btn-left {
    position:fixed; bottom:28px; left:28px; z-index:20;
    width:52px; height:52px; border-radius:50%;
    background:var(--glass2); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    border:1px solid var(--border); box-shadow:var(--shadow);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    font-size:22px; transition:all .35s; color:#e05d7c;
  }
  .float-btn-left:hover { transform:scale(1.08); box-shadow:var(--shadow-lg); }

  /* ─── 右下角：漂流瓶 ─── */
  .float-btn-right {
    position:fixed; bottom:28px; right:28px; z-index:20;
    width:52px; height:52px; border-radius:50%;
    background:var(--glass2); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    border:1px solid var(--border); box-shadow:var(--shadow);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    font-size:22px; transition:all .35s; color:#e05d7c;
  }
  .float-btn-right:hover { transform:scale(1.08); box-shadow:var(--shadow-lg); }
  .bottle-badge {
    position:absolute; top:-4px; right:-4px; min-width:18px; height:18px;
    border-radius:9px; background:#e05d7c; color:#fff; font-size:10px;
    display:flex; align-items:center; justify-content:center; padding:0 5px;
    font-weight:600; line-height:1;
  }
  .bottle-badge:empty { display:none; }

  /* ─── 面板通用 ─── */
  .panel-overlay {
    position:fixed; inset:0; z-index:100; background:rgba(60,20,30,0.15);
    backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
    display:flex; align-items:flex-end; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity .35s;
  }
  .panel-overlay.open { opacity:1; pointer-events:auto; }
  .panel {
    background:rgba(255,248,250,0.92); backdrop-filter:blur(30px); -webkit-backdrop-filter:blur(30px);
    border-radius:28px 28px 0 0; width:100%; max-width:480px; max-height:72vh;
    display:flex; flex-direction:column; overflow:hidden;
    transform:translateY(100%); transition:transform .4s cubic-bezier(.23,1,.32,1);
    box-shadow:0 -8px 40px rgba(200,120,140,0.15);
  }
  .panel-overlay.open .panel { transform:translateY(0); }
  .panel-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:20px 24px 12px; border-bottom:1px solid rgba(220,180,190,0.25); flex-shrink:0;
  }
  .panel-header h3 { font-size:17px; color:var(--text); letter-spacing:2px; font-weight:600; }
  .panel-close {
    width:32px; height:32px; border-radius:50%; border:none;
    background:rgba(220,180,190,0.2); font-size:16px; cursor:pointer;
    color:var(--text-light); transition:all .3s; display:flex; align-items:center; justify-content:center;
  }
  .panel-close:hover { background:rgba(220,150,165,0.35); color:var(--text); }
  .panel-body { flex:1; overflow-y:auto; padding:16px 24px 24px; }

  /* ─── 愿望墙 ─── */
  .wall-empty { text-align:center; padding:40px 20px; color:var(--text-light); font-size:14px; letter-spacing:1px; }
  .wall-item {
    display:flex; align-items:center; gap:12px; padding:13px 16px;
    border-radius:16px; background:rgba(255,255,255,0.5); margin-bottom:8px;
    border:1px solid rgba(220,180,190,0.2);
  }
  .wall-num { width:28px; height:28px; border-radius:50%; background:linear-gradient(135deg,#f7a0b5,#e05d7c); color:#fff; font-size:12px; font-weight:600; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .wall-text { flex:1; font-size:14px; color:var(--text); letter-spacing:1px; }
  .wall-time { font-size:11px; color:var(--text-light); flex-shrink:0; }

  /* ─── 漂流瓶面板 ─── */
  .bottle-unread-section { text-align:center; margin-bottom:20px; }
  .bottle-unread-count { font-size:48px; font-weight:200; color:var(--pink-500); letter-spacing:2px; }
  .bottle-unread-label { font-size:12px; color:var(--text-light); letter-spacing:1px; }
  .bottle-open-btn {
    display:block; margin:14px auto 0; padding:12px 32px; border-radius:22px;
    border:none; background:linear-gradient(135deg,#f07a95,#e05d7c);
    color:#fff; font-size:14px; font-weight:600; cursor:pointer;
    letter-spacing:2px; transition:all .35s; font-family:inherit;
    box-shadow:0 4px 16px rgba(224,93,124,0.25);
  }
  .bottle-open-btn:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(224,93,124,0.35); }
  .bottle-open-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
  .bottle-divider { width:60px; height:1px; background:linear-gradient(90deg,transparent,rgba(210,160,175,0.4),transparent); margin:20px auto; }
  .bottle-input-section { text-align:center; }
  .bottle-input-label { font-size:12px; color:var(--text-light); letter-spacing:2px; margin-bottom:10px; }
  .bottle-input {
    width:100%; padding:13px 16px; border-radius:16px;
    border:1.5px solid rgba(220,170,185,0.35); background:rgba(255,255,255,0.5);
    font-size:14px; color:var(--text); outline:none; transition:all .35s;
    font-family:inherit; letter-spacing:1px; resize:none; height:80px;
  }
  .bottle-input:focus { border-color:var(--pink-500); box-shadow:0 0 0 4px rgba(240,122,149,0.06); }
  .bottle-input::placeholder { color:#c8a8b4; }
  .bottle-send-btn {
    margin-top:10px; padding:10px 28px; border-radius:20px;
    border:none; background:linear-gradient(135deg,#f07a95,#e05d7c);
    color:#fff; font-size:13px; font-weight:600; cursor:pointer;
    letter-spacing:2px; transition:all .35s; font-family:inherit;
    box-shadow:0 4px 16px rgba(224,93,124,0.2);
  }
  .bottle-send-btn:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(224,93,124,0.3); }

  /* ─── 漂流瓶揭示弹窗 ─── */
  .reveal-overlay {
    position:fixed; inset:0; z-index:200; background:rgba(60,20,30,0.25);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity .4s;
  }
  .reveal-overlay.open { opacity:1; pointer-events:auto; }
  .reveal-card {
    background:rgba(255,248,250,0.95); backdrop-filter:blur(30px); -webkit-backdrop-filter:blur(30px);
    border-radius:24px; padding:36px 28px; width:340px; max-width:90vw;
    text-align:center; box-shadow:0 20px 60px rgba(180,100,120,0.25);
    border:1px solid rgba(255,220,230,0.5);
    animation: revealPop .45s cubic-bezier(.23,1,.32,1);
  }
  @keyframes revealPop { 0% { transform:scale(0.8) translateY(20px); opacity:0; } 100% { transform:scale(1) translateY(0); opacity:1; } }
  .reveal-card.burning { animation: burnAway .8s ease-in forwards; }
  @keyframes burnAway {
    0% { transform:scale(1); opacity:1; filter:blur(0); }
    30% { transform:scale(1.05); opacity:0.9; filter:blur(1px); }
    100% { transform:scale(0.7); opacity:0; filter:blur(8px); }
  }
  .reveal-icon { font-size:56px; display:block; margin-bottom:12px; }
  .reveal-msg { font-size:16px; color:var(--text); letter-spacing:2px; line-height:1.6; margin-bottom:6px; }
  .reveal-time { font-size:11px; color:var(--text-light); margin-bottom:18px; }
  .reveal-burn-hint { font-size:12px; color:#e05d7c; letter-spacing:1px; animation: blinkHint 1.5s ease-in-out infinite; }
  @keyframes blinkHint { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  /* ─── Toast ─── */
  .toast {
    position:fixed; top:30px; left:50%; translate:-50% 0; z-index:300;
    padding:10px 24px; border-radius:22px; background:rgba(255,248,250,0.9);
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    border:1px solid rgba(255,200,215,0.5); color:var(--text);
    font-size:13px; letter-spacing:1px; box-shadow:0 4px 20px rgba(200,120,150,0.2);
    pointer-events:none; opacity:0; transform:translateY(-10px);
    transition:all .4s cubic-bezier(.23,1,.32,1);
  }
  .toast.show { opacity:1; transform:translateY(0); }
</style>
</head>
<body>

<!-- 背景柔光 -->
<div class="bg-glow g1"></div>
<div class="bg-glow g2"></div>
<div class="bg-glow g3"></div>

<!-- 背景花瓣 -->
<div class="petal-container" id="petalContainer"></div>

<!-- 浮动愿望层 -->
<div class="floating-wishes" id="floatingWishes"></div>

<!-- 主卡片 -->
<div class="main-container">
  <div class="card">
    <div class="title-icon">❄️</div>
    <div class="title">雪雪心想事成</div>
    <div class="subtitle">许下心愿 · 如雪花般飘落</div>
    <div class="input-group">
      <input class="wish-input" id="wishInput" type="text" placeholder="写下你的愿望…" maxlength="30" autocomplete="off" />
      <button class="btn-submit" id="btnSubmit">✨ 许愿</button>
    </div>
    <div class="preset-label">— 点击快速许愿 —</div>
    <div class="preset-tags" id="presetTags">
      <span class="preset-tag" data-wish="天天开心">天天开心</span>
      <span class="preset-tag" data-wish="万事如意">万事如意</span>
      <span class="preset-tag" data-wish="暴富暴美">暴富暴美</span>
      <span class="preset-tag" data-wish="身体健康">身体健康</span>
      <span class="preset-tag" data-wish="好运连连">好运连连</span>
      <span class="preset-tag" data-wish="梦想成真">梦想成真</span>
    </div>
    <div class="wish-count">已许下 <span id="wishCounter">0</span> 个心愿</div>
  </div>
</div>

<!-- 左下角：愿望墙 -->
<button class="float-btn-left" id="btnWishWall" title="愿望墙">💝</button>

<!-- 右下角：漂流瓶 -->
<button class="float-btn-right" id="btnBottle" title="漂流瓶">
  🍾<span class="bottle-badge" id="bottleBadge"></span>
</button>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- 愿望墙面板 -->
<div class="panel-overlay" id="wallOverlay">
  <div class="panel">
    <div class="panel-header">
      <h3>💝 愿望墙</h3>
      <button class="panel-close" id="btnWallClose">✕</button>
    </div>
    <div class="panel-body" id="wallBody">
      <div class="wall-empty">💫 还没有愿望呢，快去许一个吧～</div>
    </div>
  </div>
</div>

<!-- 漂流瓶面板 -->
<div class="panel-overlay" id="bottleOverlay">
  <div class="panel">
    <div class="panel-header">
      <h3>🍾 漂流瓶</h3>
      <button class="panel-close" id="btnBottleClose">✕</button>
    </div>
    <div class="panel-body">
      <!-- 未读瓶子 -->
      <div class="bottle-unread-section">
        <div class="bottle-unread-count" id="bottleUnreadCount">0</div>
        <div class="bottle-unread-label">个未打开的漂流瓶</div>
        <button class="bottle-open-btn" id="bottleOpenBtn" disabled>📜 打开一个随机漂流瓶</button>
      </div>
      <div class="bottle-divider"></div>
      <!-- 扔瓶子 -->
      <div class="bottle-input-section">
        <div class="bottle-input-label">📝 写下你的心事，投入大海</div>
        <textarea class="bottle-input" id="bottleMsg" placeholder="写下你想说的话…（最多100字）" maxlength="100"></textarea>
        <button class="bottle-send-btn" id="btnThrow">🌊 投入大海</button>
      </div>
    </div>
  </div>
</div>

<!-- 漂流瓶揭示弹窗 -->
<div class="reveal-overlay" id="revealOverlay">
  <div class="reveal-card" id="revealCard">
    <span class="reveal-icon">📜</span>
    <p class="reveal-msg" id="revealMsg"></p>
    <p class="reveal-time" id="revealTime"></p>
    <p class="reveal-burn-hint">🔥 此消息阅后即焚</p>
  </div>
</div>

<script>
(function(){
  // ═══════════════════════════════════════
  //  Supabase 配置
  // ═══════════════════════════════════════
  const SUPABASE_URL = 'https://mdqphmajsymhvfjjqxzo.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1kcXBobWFqc3ltaHZmampxeHpvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNzgxNDAsImV4cCI6MjA5Nzc1NDE0MH0.CvwkzduVhhkpBinc588DjS_ZuUz_Q6F9ULjIgkGjBug';
  let supabase = null;
  let localInsertIds = new Set();
  let localUpdateIds = new Set();

  try {
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  } catch(e) {
    console.warn('Supabase 初始化失败，使用本地存储');
  }

  // ═══════════════════════════════════════
  //  DOM 元素
  // ═══════════════════════════════════════
  const input       = document.getElementById('wishInput');
  const btn         = document.getElementById('btnSubmit');
  const counter     = document.getElementById('wishCounter');
  const floatingWishes = document.getElementById('floatingWishes');
  const bottleBadge = document.getElementById('bottleBadge');
  const bottleUnreadCount = document.getElementById('bottleUnreadCount');
  const bottleOpenBtn = document.getElementById('bottleOpenBtn');
  const bottleMsg   = document.getElementById('bottleMsg');
  const revealOverlay = document.getElementById('revealOverlay');
  const revealCard  = document.getElementById('revealCard');
  const revealMsg   = document.getElementById('revealMsg');
  const revealTime  = document.getElementById('revealTime');
  const toast       = document.getElementById('toast');

  let wishMessages = [];
  let totalWishes = 0;
  let totalUnread = 0;
  let currentReveal = null;

  // ═══════════════════════════════════════
  //  Toast
  // ═══════════════════════════════════════
  let toastTimer;
  function showToast(msg) {
    toast.textContent = msg; toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
  }

  // ═══════════════════════════════════════
  //  浮动愿望（上升）
  // ═══════════════════════════════════════
  const pinkColors = ['#f07a95','#e05d7c','#f48fb1','#f89aaf','#d48a96','#ffb8c6','#e891a0'];

  function spawnFloatingWish(text) {
    const el = document.createElement('span');
    el.className = 'floating-wish';
    el.textContent = text;
    el.style.color = pinkColors[Math.floor(Math.random() * pinkColors.length)];
    const card = document.querySelector('.card');
    const rect = card.getBoundingClientRect();
    el.style.left = (rect.left + rect.width/2 + (Math.random() - 0.5) * 200) + 'px';
    el.style.top = (rect.top + rect.height/2 + (Math.random() - 0.5) * 60) + 'px';
    el.style.animationDuration = (6 + Math.random() * 6) + 's';
    el.style.animationDelay = '0s';
    floatingWishes.appendChild(el);
    setTimeout(() => el.remove(), 13000);
  }

  // ═══════════════════════════════════════
  //  数据加载
  // ═══════════════════════════════════════
  async function loadData() {
    if (!supabase) return;
    const { count } = await supabase
      .from('wishes').select('*', { count: 'exact', head: true });
    if (count !== null) {
      totalWishes = count;
      counter.textContent = totalWishes;
    }
    // 加载愿望墙数据
    const { data: wishesData } = await supabase
      .from('wishes').select('*').order('created_at', { ascending: true }).limit(500);
    if (wishesData) {
      wishMessages = wishesData;
    }
    await refreshUnreadCount();
  }

  async function refreshUnreadCount() {
    if (!supabase) return;
    const { count, error } = await supabase
      .from('messages')
      .select('*', { count: 'exact', head: true })
      .eq('revealed', false);
    if (!error && count !== null) {
      totalUnread = count;
      updateBottleBadge();
      updateBottlePanel();
    }
  }

  function updateBottleBadge() {
    bottleBadge.textContent = totalUnread > 0 ? (totalUnread > 99 ? '99+' : totalUnread) : '';
  }
  function updateBottlePanel() {
    bottleUnreadCount.textContent = totalUnread;
    bottleOpenBtn.disabled = totalUnread === 0;
  }

  // ═══════════════════════════════════════
  //  实时订阅
  // ═══════════════════════════════════════
  function setupRealtime() {
    if (!supabase) return;

    // 订阅新愿望
    supabase
      .channel('wishes-realtime')
      .on('postgres_changes',
        { event: 'INSERT', schema: 'public', table: 'wishes' },
        (payload) => {
          if (localInsertIds.has(payload.new.id)) { localInsertIds.delete(payload.new.id); return; }
          wishMessages.push(payload.new);
          totalWishes++;
          counter.textContent = totalWishes;
          spawnFloatingWish(payload.new.text);
          if (wallOverlay.classList.contains('open')) renderWall();
        }
      )
      .subscribe();

    // 订阅新瓶子
    supabase
      .channel('messages-realtime')
      .on('postgres_changes',
        { event: 'INSERT', schema: 'public', table: 'messages' },
        (payload) => {
          if (localInsertIds.has(payload.new.id)) { localInsertIds.delete(payload.new.id); return; }
          if (!payload.new.revealed) { totalUnread++; updateBottleBadge(); updateBottlePanel(); }
        }
      )
      .on('postgres_changes',
        { event: 'UPDATE', schema: 'public', table: 'messages' },
        (payload) => {
          if (localUpdateIds.has(payload.new.id)) { localUpdateIds.delete(payload.new.id); return; }
          if (payload.new.revealed && !payload.old.revealed) { totalUnread = Math.max(0, totalUnread - 1); updateBottleBadge(); updateBottlePanel(); }
        }
      )
      .subscribe();
  }

  // ═══════════════════════════════════════
  //  许愿
  // ═══════════════════════════════════════
  async function addWish(text) {
    spawnFloatingWish(text);
    if (supabase) {
      // 先用临时 ID 防止重复
      const tempId = 'temp_' + Date.now() + '_' + Math.random();
      localInsertIds.add(tempId);
      const { data, error } = await supabase
        .from('wishes')
        .insert({ text, created_at: new Date().toISOString() })
        .select().single();
      if (data) {
        localInsertIds.add(data.id);
        wishMessages.push(data);
        totalWishes = wishMessages.length;
        counter.textContent = totalWishes;
      }
      localInsertIds.delete(tempId);
    } else {
      totalWishes++;
      counter.textContent = totalWishes;
    }
  }

  function submitWish() {
    const text = input.value.trim();
    if (!text) return;
    if (text.length > 30) { shakeEl(input); return; }
    addWish(text);
    input.value = ''; input.focus();
  }

  function shakeEl(el) {
    el.style.animation = 'none'; el.offsetHeight;
    el.style.animation = 'shake .4s ease';
    setTimeout(() => el.style.animation = '', 400);
  }

  btn.addEventListener('click', submitWish);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') submitWish(); });
  document.getElementById('presetTags').addEventListener('click', e => {
    const tag = e.target.closest('.preset-tag');
    if (!tag) return;
    addWish(tag.dataset.wish);
  });

  // ═══════════════════════════════════════
  //  漂流瓶 - 扔瓶子
  // ═══════════════════════════════════════
  document.getElementById('btnThrow').addEventListener('click', async () => {
    const msg = bottleMsg.value.trim();
    if (!msg) { showToast('💬 写点什么再扔吧～'); return; }
    if (supabase) {
      const tempId = 'temp_' + Date.now() + '_' + Math.random();
      localInsertIds.add(tempId);
      const { data, error } = await supabase
        .from('messages')
        .insert({ text: msg, created_at: new Date().toISOString(), revealed: false })
        .select().single();
      if (data) {
        localInsertIds.add(data.id);
        totalUnread++;
        updateBottleBadge();
        updateBottlePanel();
      }
      localInsertIds.delete(tempId);
    }
    bottleMsg.value = '';
    showToast('🌊 瓶子已投入大海！');
  });

  // ═══════════════════════════════════════
  //  漂流瓶 - 打开一个随机瓶子
  // ═══════════════════════════════════════
  bottleOpenBtn.addEventListener('click', async () => {
    if (!supabase || totalUnread === 0) return;
    const { data } = await supabase
      .from('messages')
      .select('*')
      .eq('revealed', false)
      .order('created_at', { ascending: true })
      .limit(1).single();
    if (!data) { showToast('🌊 没有未打开的瓶子'); return; }
    // 标记为已读
    const { error } = await supabase
      .from('messages')
      .update({ revealed: true })
      .eq('id', data.id);
    if (!error) {
      localUpdateIds.add(data.id);
      totalUnread = Math.max(0, totalUnread - 1);
      updateBottleBadge();
      updateBottlePanel();
    }
    // 揭示
    currentReveal = data;
    revealMsg.textContent = data.text;
    revealTime.textContent = '🕐 ' + new Date(data.created_at).toLocaleString('zh-CN');
    revealCard.classList.remove('burning');
    revealOverlay.classList.add('open');
  });

  // 阅后即焚
  revealOverlay.addEventListener('click', () => {
    if (!currentReveal) return;
    revealCard.classList.add('burning');
    setTimeout(() => {
      revealOverlay.classList.remove('open');
      currentReveal = null;
    }, 800);
  });

  // ═══════════════════════════════════════
  //  愿望墙面板
  // ═══════════════════════════════════════
  const wallOverlay = document.getElementById('wallOverlay');
  const wallBody    = document.getElementById('wallBody');

  function renderWall() {
    if (wishMessages.length === 0) {
      wallBody.innerHTML = '<div class="wall-empty">💫 还没有愿望呢，快去许一个吧～</div>';
      return;
    }
    wallBody.innerHTML = [...wishMessages].reverse().map((w, i) => `
      <div class="wall-item">
        <span class="wall-num">${wishMessages.length - i}</span>
        <span class="wall-text">${escapeHtml(w.text)}</span>
        <span class="wall-time">${new Date(w.created_at).toLocaleString('zh-CN')}</span>
      </div>
    `).join('');
  }
  function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  document.getElementById('btnWishWall').addEventListener('click', () => {
    renderWall();
    wallOverlay.classList.add('open');
  });
  document.getElementById('btnWallClose').addEventListener('click', () => {
    wallOverlay.classList.remove('open');
  });
  wallOverlay.addEventListener('click', e => {
    if (e.target === wallOverlay) wallOverlay.classList.remove('open');
  });

  // ═══════════════════════════════════════
  //  漂流瓶面板
  // ═══════════════════════════════════════
  const bottleOverlay = document.getElementById('bottleOverlay');
  document.getElementById('btnBottle').addEventListener('click', () => {
    updateBottlePanel();
    bottleOverlay.classList.add('open');
  });
  document.getElementById('btnBottleClose').addEventListener('click', () => {
    bottleOverlay.classList.remove('open');
  });
  bottleOverlay.addEventListener('click', e => {
    if (e.target === bottleOverlay) bottleOverlay.classList.remove('open');
  });

  // ═══════════════════════════════════════
  //  背景花瓣
  // ═══════════════════════════════════════
  const petalContainer = document.getElementById('petalContainer');
  const petalEmojis = ['🌸','💮','🌷','🩷','✿','❀','🌺'];
  function createPetal() {
    const p = document.createElement('span');
    p.className = 'petal';
    p.textContent = petalEmojis[Math.floor(Math.random() * petalEmojis.length)];
    p.style.left = Math.random() * 100 + '%';
    p.style.top = -(20 + Math.random() * 60) + 'px';
    p.style.setProperty('--dx', (Math.random() - 0.5) * 200 + 'px');
    p.style.setProperty('--dr', (Math.random() - 0.5) * 720 + 'deg');
    p.style.fontSize = (14 + Math.random() * 18) + 'px';
    p.style.animationDuration = (10 + Math.random() * 18) + 's';
    p.style.animationDelay = Math.random() * 5 + 's';
    petalContainer.appendChild(p);
    setTimeout(() => p.remove(), 25000);
  }
  for (let i = 0; i < 14; i++) createPetal();
  setInterval(createPetal, 3000);

  // ═══════════════════════════════════════
  //  初始化
  // ═══════════════════════════════════════
  const shakeStyle = document.createElement('style');
  shakeStyle.textContent = '@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}';
  document.head.appendChild(shakeStyle);

  async function init() {
    await loadData();
    setupRealtime();
    // 如果数据库已有愿望，不再添加初始愿望
    if (totalWishes === 0) {
      setTimeout(() => addWish('心想事成'), 600);
      setTimeout(() => addWish('天天开心'), 1200);
      setTimeout(() => addWish('万事如意'), 1800);
    }
    // 每 30 秒从服务器校准一次数字
    setInterval(async () => {
      if (!supabase) return;
      const { count } = await supabase
        .from('wishes').select('*', { count: 'exact', head: true });
      if (count !== null) { totalWishes = count; counter.textContent = totalWishes; }
      await refreshUnreadCount();
    }, 30000);
  }
  init();
})();
</script>
</body>
</html>
